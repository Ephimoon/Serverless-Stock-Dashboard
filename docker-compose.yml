services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:3000
      - CHOKIDAR_USEPOLLING=true
    command: npm run dev -- --host 0.0.0.0

  frontend-preview:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"

  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run build

  ingest-lambda:
    build:
      context: ./backend
      dockerfile: Dockerfile.lambda
    platform: linux/amd64
    ports:
      - "9000:8080"
    env_file:
      - .env
    command: ["ingest.handler.lambda_handler"]
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /var/task
          ignore:
            - __pycache__/
            - "*.pyc"
            - ".pytest_cache/"
            - "venv/"
            - ".venv/"

  api-lambda:
    build:
      context: ./backend
      dockerfile: Dockerfile.lambda
    platform: linux/amd64
    ports:
      - "9001:8080"
    env_file:
      - .env
    command: ["api.handler.lambda_handler"]
    develop:
      watch:
        - action: sync+restart
          path: ./backend
          target: /var/task
          ignore:
            - __pycache__/
            - "*.pyc"
            - ".pytest_cache/"
            - "venv/"
            - ".venv/"

  backend-tests:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
    environment:
      - PYTHONPATH=/app
      - PIP_ROOT_USER_ACTION=ignore
    command: sh -c "pip install --no-cache-dir -r requirements-dev.txt >/dev/null && pytest -v --cov=ingest --cov=api --cov=common --cov-report=term-missing"

  cdk:
    build:
      context: ./infrastructure
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./infrastructure:/app
      - /app/node_modules
      - ./backend:/backend
      - ./frontend:/frontend
      - ~/.aws:/root/.aws:ro
      # SECURITY: mounting docker.sock grants the container root-equivalent access to the host; use only on trusted machines.
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    command: npx cdk synth

  cdk-bootstrap:
    build:
      context: ./infrastructure
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./infrastructure:/app
      - /app/node_modules
      - ./frontend:/frontend
      - ./backend:/backend
      - ~/.aws:/root/.aws:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    command: npx cdk bootstrap

  cdk-deploy:
    build:
      context: ./infrastructure
      dockerfile: Dockerfile
    working_dir: /app
    volumes:
      - ./infrastructure:/app
      - /app/node_modules
      - ./backend:/backend
      - ./frontend:/frontend
      - ~/.aws:/root/.aws:ro
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    command: npx cdk deploy